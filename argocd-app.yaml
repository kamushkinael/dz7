apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com' # ТВОЙ РЕПОЗИТОРИЙ
    targetRevision: HEAD
    path: charts/flask-app
  destination:
    server: 'https://default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
