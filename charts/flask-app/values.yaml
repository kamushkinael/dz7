# Общие настройки
name: flask-app

# Flask приложение
replicaCount: 2
image:
  repository: kamushkinael/flask-app
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80

# PostgreSQL (то, что вы хотели!)
postgres:
  image: postgres
  tag: 13-alpine
  user: user
  password: password
  database: mydb
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  healthcheck:
    enabled: true
    initialDelay: 30
    period: 10

# Redis (то, что вы хотели!)
redis:
  image: redis
  tag: alpine
  password: ""  # пусто = без пароля
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  healthcheck:
    enabled: true
    initialDelay: 10
    period: 10

# Ресурсы для Flask приложения
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
