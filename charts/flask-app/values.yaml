# Основное приложение
replicaCount: 2

image:
  repository: yourusername/flask-app  # замените на ваш образ
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80

# PostgreSQL
postgresql:
  auth:
    username: user
    password: password
    database: mydb
  primary:
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Redis
redis:
  auth:
    enabled: true
    password: password
  architecture: standalone
  master:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"
