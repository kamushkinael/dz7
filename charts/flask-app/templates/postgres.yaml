apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-postgres
  labels:
    app: {{ .Values.name }}-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}-postgres
  template:
    metadata:
      labels:
        app: {{ .Values.name }}-postgres
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}:{{ .Values.postgres.tag }}
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgres.password }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database }}
        resources:
          requests:
            memory: {{ .Values.postgres.resources.requests.memory }}
            cpu: {{ .Values.postgres.resources.requests.cpu }}
          limits:
            memory: {{ .Values.postgres.resources.limits.memory }}
            cpu: {{ .Values.postgres.resources.limits.cpu }}
        {{- if .Values.postgres.healthcheck.enabled }}
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - {{ .Values.postgres.user }}
            - -d
            - {{ .Values.postgres.database }}
          initialDelaySeconds: {{ .Values.postgres.healthcheck.initialDelay }}
          periodSeconds: {{ .Values.postgres.healthcheck.period }}
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - {{ .Values.postgres.user }}
            - -d
            - {{ .Values.postgres.database }}
          initialDelaySeconds: 5
          periodSeconds: 5
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-postgres
spec:
  selector:
    app: {{ .Values.name }}-postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
