apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: web
          image: {{ .Values.image }}
          env:
            - name: DATABASE_URL
              value: "postgresql://user:password@{{ .Release.Name }}-postgresql:5432/mydb"
            - name: REDIS_HOST
              value: "{{ .Release.Name }}-redis-master"
          ports:
            - containerPort: 80

