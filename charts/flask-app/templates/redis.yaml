apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-redis
  labels:
    app: {{ .Values.name }}-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}-redis
  template:
    metadata:
      labels:
        app: {{ .Values.name }}-redis
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}:{{ .Values.redis.tag }}
        ports:
        - containerPort: 6379
        {{- if .Values.redis.password }}
        args: ["--requirepass", {{ .Values.redis.password | quote }}]
        {{- end }}
        resources:
          requests:
            memory: {{ .Values.redis.resources.requests.memory }}
            cpu: {{ .Values.redis.resources.requests.cpu }}
          limits:
            memory: {{ .Values.redis.resources.limits.memory }}
            cpu: {{ .Values.redis.resources.limits.cpu }}
        {{- if .Values.redis.healthcheck.enabled }}
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: {{ .Values.redis.healthcheck.initialDelay }}
          periodSeconds: {{ .Values.redis.healthcheck.period }}
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-redis
spec:
  selector:
    app: {{ .Values.name }}-redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
